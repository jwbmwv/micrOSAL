="bold" lengthAdjust="spacing" textLength="78.7676" x="286.2189" y="625.0784">.rodata</text><text fill="#000000" font-family="'Segoe UI'" font-size="19.1952" lengthAdjust="spacing" textLength="82.5635" x="371.0881" y="625.0784">(FLASH).</text><text fill="#000000" font-family="'Segoe UI'" font-size="19.1952" lengthAdjust="spacing" textLength="445.6875" x="37.0192" y="647.4228">Zero RAM cost for the descriptors themselves.</text></g><g class="entity" data-entity="GMN25" data-source-line="52" data-uid="ent0026" id="entity_GMN25"><path d="M324.261,774.1261 L324.261,882.2917 L830.5775,882.2917 L830.5775,787.8369 L816.8667,774.1261 L324.261,774.1261" fill="#FFFFFF" style="stroke:#000000;stroke-width:1.3711;"/><path d="M816.8667,774.1261 L816.8667,787.8369 L830.5775,787.8369 L816.8667,774.1261" fill="#FFFFFF" style="stroke:#000000;stroke-width:1.3711;"/><text fill="#000000" font-family="'Segoe UI'" font-size="19.1952" lengthAdjust="spacing" textLength="412.0773" x="346.1984" y="812.5097">Only the OS handle (void*) and a valid flag</text><text fill="#000000" font-family="'Segoe UI'" font-size="19.1952" lengthAdjust="spacing" textLength="436.5399" x="346.1984" y="834.8541">reside in RAM. Dead stored fields (type_ from</text><text fill="#000000" font-family="'Segoe UI'" font-size="19.1952" lengthAdjust="spacing" textLength="450.1021" x="346.1984" y="857.1984">mutex, type_ from semaphore) were removed.</text></g><!--link mc to m--><g class="link" data-entity-1="mc" data-entity-2="m" data-source-line="38" data-uid="lnk16" id="link_mc_m"><path d="M697.7714,297.0442 C706.7657,362.4997 723.7449,486.0147 733.6852,558.4079" fill="none" id="mc-to-m" style="stroke:#4CAF50;stroke-width:1.3711;"/><polygon fill="#4CAF50" points="734.8043,566.5579,738.559,553.5868,733.8717,559.7662,727.6923,555.0789,734.8043,566.5579" style="stroke:#4CAF50;stroke-width:1.3711;"/><text fill="#000000" font-family="'Segoe UI'" font-size="19.1952" lengthAdjust="spacing" textLength="37.7155" x="729.416" y="417