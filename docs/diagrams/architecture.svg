106" id="ent0082"><rect fill="#FFFFFF" height="54.7434" rx="2.0653" ry="2.0653" style="stroke:#000000;stroke-width:0.8261;" width="192.2499" x="1725.3541" y="2556.5223"/><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="162.5095" x="1740.2242" y="2581.3612">posix_pthread_work_queue.inl</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="161.9589" x="1740.2242" y="2593.8627">(pthread thread + ring buffer)</text></g><!--entity native--><g class="entity" data-qualified-name="kernel.native" data-source-line="111" id="ent0084"><rect fill="#FFFFFF" height="79.7465" rx="2.0653" ry="2.0653" style="stroke:#000000;stroke-width:0.8261;" width="208.0236" x="2050.4327" y="2317.3602"/><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="87.8831" x="2065.3029" y="2342.1991">Native RTOS API</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="157.8634" x="2065.3029" y="2354.7007">(FreeRTOS, Zephyr, ThreadX,</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="110.9616" x="2065.3029" y="2367.2022">pthread, Wind River,</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="178.2832" x="2065.3029" y="2379.7037">CMSIS-RTOS, CMSIS-RTOS2, etc.)</text></g><g class="entity" data-qualified-name="GMN285" data-source-line="246" id="ent0286"><path d="M1282.14,747.317 L1282.14,881.3099 L1477.8957,881.3099 L1477.8957,755.5782 L1469.6345,747.317 L1282.14,747.317" fill="#FFFFFF" style="stroke:#AAAAAA;stroke-width:0.8261;"/><path d="M1469.6345,747.317 L1469.6345,755.5782 L1477.8957,755.5782 L1469.6345,747.317" fill="#FFFFFF" style="stroke:#AAAAAA;stroke-width:0.8261;"/><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" font-weight="bold" lengthAdjust="spacing" textLength="113.054" x="1293.7057" y="768.0252">Zero-cost dispatch</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="108.6491" x="1293.7057" y="780.5268">No virtual functions.</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="111.2763" x="1293.7057" y="793.0283">No RTTI. All resolved</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="103.5467" x="1293.7057" y="805.5299">at compile time via</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="130.7365" x="1293.7057" y="818.0314">template specializations</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="90.4946" x="1300.5333" y="830.5329">and if constexpr.</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="132.488" x="1300.5333" y="843.0345">Native-only surfaces use</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="158.3615" x="1300.5333" y="855.536">compile-time support helpers</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="140.8101" x="1300.5333" y="868.0375">instead of fake emulation.</text></g><g class="entity" data-qualified-name="GMN288" data-source-line="258" id="ent0289"><path d="M2062.4115,3443.3634 L2062.4115,3539.8517 L2246.2844,3539.8517 L2246.2844,3451.6246 L2238.0231,3443.3634 L2062.4115,3443.3634" fill="#FFFFFF" style="stroke:#AAAAAA;stroke-width:0.8261;"/><path d="M2238.0231,3443.3634 L2238.0231,3451.6246 L2246.2844,3451.6246 L2238.0231,3443.3634" fill="#FFFFFF" style="stroke:#AAAAAA;stroke-width:0.8261;"/><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="132.6453" x="2073.9772" y="3464.0717">Backends without native</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="113.5941" x="2073.9772" y="3476.5732">support #include the</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="122.8601" x="2080.8048" y="3489.0747">shared .inl emulations.</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="146.4788" x="2080.8048" y="3501.5763">`barrier` stays portable via</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="132.2887" x="2080.8048" y="3514.0778">native backend hooks or</text><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="123.0227" x="2080.8048" y="3526.5793">`emulated_barrier.inl`.</text></g><!--link user to api--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="115" id="lnk85"><path d="M139.9862,1219.0321 C190.7886,1219.0321 266.0151,1219.0321 328.9305,1219.0321 C330.8966,1219.0321 332.8507,1219.0321 334.7916,1219.0321 C335.2768,1219.0321 330.8045,1219.0321 331.2881,1219.0321" fill="none" id="user-to-api" style="stroke:#000000;stroke-width:0.8261;"/><polygon fill="#000000" points="336.2448,1219.0321,328.8097,1215.7277,332.1142,1219.0321,328.8097,1222.3366,336.2448,1219.0321" style="stroke:#000000;stroke-width:0.8261;"/><text fill="#000000" font-family="'Segoe UI'" font-size="10.7396" lengthAdjust="spacing" textLength="136.8509" x="173.4854" y="1209.1739">includes &lt;osal/osal.hpp&gt;</text></g><!--link mutex to dispatch--><g class="link" data-entity-1="ent0005" data-entity-2="ent0027" data-link-type="dependency" data-source-line="117" id="lnk86"><path d="M491.7486,986.4708 C506.7758,991.1962 522.2903,998.7552 532.8482,1010.8496 C550.6593,1031.2465 525.6526,1052.5357 546.0661,1070.3303 C613.2297,1128.8693 881.1243,1107.9188 946.3218,1047.1989 C1003.4357,994