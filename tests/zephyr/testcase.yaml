# testcase.yaml — twister test descriptor for MicrOSAL Zephyr tests
#
# Run with:
#   west twister -T tests/zephyr
#   west twister -T tests/zephyr -p native_sim -p qemu_cortex_m3
#
# Users can retarget to any Zephyr-supported board/SoC by adding the
# board name to the platform_allow list or passing -p <board> to twister.

common:
  tags: osal rtos abstraction
  timeout: 120
  min_ram: 32
  min_flash: 128

tests:
  # -------------------------------------------------------------------
  # native_sim — runs as a native Linux process, fastest CI turnaround
  # -------------------------------------------------------------------
  microsal.ztest.native_sim:
    platform_allow:
      - native_sim
    integration_platforms:
      - native_sim

  # -------------------------------------------------------------------
  # nRF52840-DK via Renode — full SoC simulation (Cortex-M4F)
  #
  # Replaces the former qemu_cortex_m3 entry.  Renode simulates the
  # complete nRF52840 peripheral model (UART, clock, radio scheduler)
  # unlike bare QEMU which only emulates the CPU core.  This surfaces
  # hardware-timing issues that native_sim cannot catch.
  #
  # Run locally (with Renode in PATH):
  #   west twister -T tests/zephyr -p nrf52840dk/nrf52840 --runner renode
  # -------------------------------------------------------------------
  microsal.ztest.renode_nrf52840:
    platform_allow:
      - nrf52840dk/nrf52840
    integration_platforms:
      - nrf52840dk/nrf52840
    extra_configs:
      - CONFIG_SERIAL=y
      - CONFIG_UART_CONSOLE=y

  # -------------------------------------------------------------------
  # Generic — any board the user selects via `twister -p <board>`
  # Includes both QEMU and Renode-supported targets.
  # -------------------------------------------------------------------
  microsal.ztest:
    platform_allow:
      - native_sim
      - nrf52840dk/nrf52840
      - qemu_cortex_m3
      - qemu_cortex_m0
      - qemu_cortex_a53
      - qemu_riscv32
      - qemu_riscv64
      - stm32f4_disco
      - nucleo_f401re
