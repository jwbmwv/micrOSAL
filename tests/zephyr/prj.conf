# SPDX-License-Identifier: Apache-2.0
# Zephyr project configuration for MicrOSAL ztest application
#
# This prj.conf enables the kernel features that the MicrOSAL Zephyr
# backend requires.  Users can overlay board-specific options via
# boards/<board>.conf or extra_conf_file.

# --- MicrOSAL module ---------------------------------------------------------
CONFIG_MICRO_OSAL=y
CONFIG_MICRO_OSAL_BACKEND_ZEPHYR=y

# --- C++ support --------------------------------------------------------------
CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# --- Kernel features required by the OSAL ------------------------------------
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Threading
CONFIG_MULTITHREADING=y
CONFIG_NUM_PREEMPT_PRIORITIES=16
CONFIG_SCHED_MULTIQ=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_NAME=y

# Native k_event objects for event flags (Zephyr 4.x)
CONFIG_EVENTS=y

# Timers

# Queues / message queues
CONFIG_POLL=y

# --- ztest framework ----------------------------------------------------------
CONFIG_ZTEST=y

# Stack size for the ztest thread
CONFIG_ZTEST_STACK_SIZE=8192

# Give tests time — QEMU can be slow
CONFIG_TEST_EXTRA_STACK_SIZE=2048
